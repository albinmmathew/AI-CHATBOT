<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gemini AI Web App</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container my-5">
        <h2 class="text-center mb-4">Gemini-Powered AI Assistant</h2>

        <!-- Input Form -->
        <form method="POST" class="mb-4">
            <label class="form-label">Enter your query:</label>
            <textarea class="form-control" name="user_text" rows="4" placeholder="Ask me anything..."></textarea>

            <button class="btn btn-primary mt-3 w-100">Ask Gemini</button>
        </form>

        <!-- Response -->
        {% if response %}
        <div class="alert alert-info">
            <strong>AI Response:</strong><br>
            {{ response }}
        </div>
        {% endif %}

        <!-- History -->
        {% if history %}
        <h4>Previous Queries</h4>
        <ul class="list-group">
            {% for item in history %}
            <li class="list-group-item">
                <strong>You:</strong> {{ item.query }}<br>
                <strong>Gemini:</strong> {{ item.response }}
            </li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>

</body>

</html>
